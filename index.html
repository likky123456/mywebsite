<!DOCTYPE html>
<html>
<head>
  <title>This Is For You Paapu ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 LOGIN PAGE -->
<div id="lock" class="page active">
  <div class="lock-content">
    <h2>Enter Password 🔐</h2>
    <input type="password" id="pass" placeholder="Enter password">
    <br><br>
    <button class="glow-btn" onclick="checkPassword()">Open 💖</button>
    <p id="hint" style="color:#ff1493; margin-top:10px;">
      Hint: You always call me by that name… 🥺❤️
    </p>
  </div>
</div>

<!-- 💌 LETTER PAGE -->
<div id="home" class="page">
  <div class="floating-hearts"></div>
  <div class="sparkle-container"></div>
  <h1 class="glow-title">For Manu ❤️</h1>

  <div class="paper">
    <p class="msg" id="letter-text"></p>
    <img id="photo" src="photo/photo.jpg" class="gallery-image">
  </div>

  <h1 id="love-msg" class="love-text">I LOVE YOU ❤️</h1>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="audio/song.mpeg" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
